<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CourseIntel Capture</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="header">
    <span class="logo">CourseIntel</span>
    <span class="badge" id="platform-badge">Detecting...</span>
  </div>

  <div class="section">
    <label class="label">Active Course</label>
    <select id="course-select" class="select">
      <option value="">Select a course...</option>
    </select>
  </div>

  <div class="section">
    <p class="hint" id="capture-hint">Navigate to an assignments page, then click Capture.</p>
    <button id="capture-btn" class="btn" disabled>Capture This Page</button>
  </div>

  <div id="result" class="result hidden"></div>

  <div class="footer">
    <a id="app-link" href="#" target="_blank">Open CourseIntel</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
